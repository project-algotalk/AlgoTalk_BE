# Eureka Server Port
server:
  port: 8761

# Eureka Server Name
spring:
  application:
    name: eurekaServer

# Eureka Server ??
eureka:
  server:
    enable-self-preservation: true # Self-Preservation ?? ???
    expected-client-renewal-interval-seconds: 100 # ????? ?? ?? ?? ?? (?)
    eviction-interval-timer-in-ms: 600 # ????? ?? ?? (???)
    renewal-percent-threshold: 0.85 # ????? ?? ?? ??? (85%)
  client:
    register-with-eureka: false   # ?? ??? ?? ? ?
    fetch-registry: false         # ?? ??? ?? ? ?

# Actuator ??(Endpoint ??)
management:
  endpoints:
    web:
      exposure:
        include: "*" # ?? ????? ?? (?? ????? ??? ?????? ?? ??)