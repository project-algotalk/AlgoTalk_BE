# Eureka Server Port
server:
  port: 8761

# Eureka Server Name
spring:
  application:
    name: eurekaServer

# Eureka Server 설정
eureka:
  server:
    enable-self-preservation: true # Self-Preservation 기능 활성화
    expected-client-renewal-interval-seconds: 100 # 클라이언트 갱신 주기 설정 (초)
    eviction-interval-timer-in-ms: 600 # 만료된 인스턴스 제거 주기 (밀리초)
    renewal-percent-threshold: 0.85 # 갱신 임계값 설정 (85%)
  client:
    register-with-eureka: false   # 자기 자신을 Eureka에 등록하지 않음
    fetch-registry: false         # Eureka 서버가 다른 서비스 목록을 가져오지 않음

# Actuator 설정(Endpoint 노출)
management:
  endpoints:
    web:
      exposure:
        include: "*" # 모든 Actuator 엔드포인트 노출